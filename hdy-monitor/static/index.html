<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDY 库存监控</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
    --accent: #6c63ff; --accent2: #00d2ff; --danger: #ff4d4d;
    --success: #00e676; --warn: #ffb300; --text: #e0e0e0; --muted: #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; font-size: 14px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; color: var(--accent2); letter-spacing: 1px; }
  header #status-badge { font-size: 12px; padding: 4px 10px; border-radius: 12px; background: #333; color: var(--muted); }
  header #status-badge.running { background: #003020; color: var(--success); }
  nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 4px; padding: 0 24px; }
  nav button { background: none; border: none; color: var(--muted); padding: 12px 16px; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; transition: all .2s; }
  nav button.active, nav button:hover { color: var(--text); border-bottom-color: var(--accent); }
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .tab { display: none; } .tab.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .card h2 { font-size: 15px; margin-bottom: 14px; color: var(--accent2); }
  .form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 12px; color: var(--muted); }
  input, select { background: #12151f; border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 13px; width: 180px; }
  input:focus, select:focus { outline: 1px solid var(--accent); }
  button.btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity .2s; }
  button.btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-success { background: var(--success); color: #000; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-warn { background: var(--warn); color: #000; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 13px; }
  th { color: var(--muted); font-weight: 500; font-size: 12px; background: #13161f; }
  tr:hover td { background: #1e2130; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #003020; color: var(--success); }
  .badge-red { background: #2a0000; color: var(--danger); }
  .badge-gray { background: #222; color: var(--muted); }
  .badge-blue { background: #001040; color: var(--accent2); }
  #toast { position: fixed; bottom: 24px; right: 24px; background: #333; color: #fff; padding: 12px 20px; border-radius: 8px; display: none; z-index: 999; max-width: 320px; }
  #toast.show { display: block; }
  #toast.success { background: #003820; border: 1px solid var(--success); }
  #toast.error { background: #2a0000; border: 1px solid var(--danger); }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .stat .val { font-size: 28px; font-weight: 700; color: var(--accent2); }
  .stat .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .channel-block { border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin-bottom: 10px; }
  .channel-block h3 { font-size: 13px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .toggle { width: 36px; height: 20px; background: #333; border-radius: 10px; position: relative; cursor: pointer; transition: background .2s; }
  .toggle.on { background: var(--accent); }
  .toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: left .2s; }
  .toggle.on::after { left: 18px; }
  .login-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 9000; align-items: center; justify-content: center; }
  .login-screen.show { display: flex; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 36px 32px; width: 340px; }
  .login-box h2 { text-align: center; margin-bottom: 24px; color: var(--accent2); }
  .login-box input { width: 100%; margin-bottom: 12px; }
  .login-box button { width: 100%; margin-top: 8px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pid-progress { height: 4px; background: #222; border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
  .pid-progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .3s; }
  pre { background: #0a0d16; border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 12px; overflow-x: auto; color: #aaa; max-height: 200px; overflow-y: auto; }
</style>
</head>
<body>

<!-- Login screen -->
<div class="login-screen show" id="login-screen">
  <div class="login-box">
    <h2>🔐 HDY 监控系统</h2>
    <input type="text" id="adm-user" placeholder="管理员账号" autocomplete="username">
    <input type="password" id="adm-pass" placeholder="管理员密码" autocomplete="current-password">
    <button class="btn btn-primary" onclick="doLogin()">登 录</button>
    <p id="login-err" style="color:var(--danger);text-align:center;margin-top:8px;font-size:12px;"></p>
  </div>
</div>

<header>
  <h1>🏪 HDY 库存监控</h1>
  <div style="display:flex;gap:12px;align-items:center;">
    <span id="status-badge">已停止</span>
    <button class="btn btn-sm btn-success" id="btn-start" onclick="startCrawler()">▶ 启动</button>
    <button class="btn btn-sm btn-danger" id="btn-stop" onclick="stopCrawler()" style="display:none">⏹ 停止</button>
  </div>
</header>

<nav>
  <button class="active" onclick="showTab('tab-dashboard', this)">📊 总览</button>
  <button onclick="showTab('tab-products', this)">📦 产品</button>
  <button onclick="showTab('tab-changes', this)">🔔 变化记录</button>
  <button onclick="showTab('tab-config', this)">⚙️ 配置</button>
  <button onclick="showTab('tab-notify', this)">📡 通知渠道</button>
</nav>

<main>

<!-- Dashboard -->
<div class="tab active" id="tab-dashboard">
  <div class="stat-grid">
    <div class="stat"><div class="val" id="s-current-pid">—</div><div class="lbl">当前 PID</div></div>
    <div class="stat"><div class="val" id="s-checked">0</div><div class="lbl">已检查</div></div>
    <div class="stat"><div class="val" id="s-changed">0</div><div class="lbl">有变化</div></div>
    <div class="stat"><div class="val" id="s-range">—</div><div class="lbl">PID 范围</div></div>
  </div>
  <div class="card">
    <h2>爬取进度</h2>
    <div class="pid-progress"><div class="pid-progress-bar" id="progress-bar" style="width:0%"></div></div>
    <p id="progress-text" style="font-size:12px;color:var(--muted)">未运行</p>
  </div>
  <div class="card">
    <h2>最近变化 <span style="font-size:12px;color:var(--muted)">(最新 10 条)</span></h2>
    <table id="dash-changes-table">
      <thead><tr><th>时间</th><th>PID</th><th>字段</th><th>旧值</th><th>新值</th></tr></thead>
      <tbody id="dash-changes-body"></tbody>
    </table>
  </div>
</div>

<!-- Products -->
<div class="tab" id="tab-products">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2>产品列表</h2>
      <button class="btn btn-sm btn-primary" onclick="loadProducts()">刷新</button>
    </div>
    <table>
      <thead><tr><th>PID</th><th>名称</th><th>价格</th><th>库存状态</th><th>最后检查</th><th>最后变化</th><th>操作</th></tr></thead>
      <tbody id="products-body"></tbody>
    </table>
  </div>
</div>

<!-- Changes -->
<div class="tab" id="tab-changes">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2>全部变化记录</h2>
      <div style="display:flex;gap:8px;">
        <input type="number" id="filter-pid" placeholder="PID 过滤" style="width:120px;" oninput="loadChanges()">
        <button class="btn btn-sm btn-primary" onclick="loadChanges()">刷新</button>
      </div>
    </div>
    <table>
      <thead><tr><th>时间</th><th>PID</th><th>字段</th><th>旧值</th><th>新值</th></tr></thead>
      <tbody id="changes-body"></tbody>
    </table>
    <div id="changes-pagination" style="margin-top:12px;display:flex;gap:8px;justify-content:center;"></div>
  </div>
</div>

<!-- Config -->
<div class="tab" id="tab-config">
  <div class="card">
    <h2>爬取设置</h2>
    <div class="form-row">
      <div class="form-group"><label>起始 PID</label><input type="number" id="cfg-start" value="1150"></div>
      <div class="form-group"><label>结束 PID</label><input type="number" id="cfg-end" value="1200"></div>
      <div class="form-group"><label>间隔(ms)</label><input type="number" id="cfg-interval" value="1500"></div>
      <div class="form-group"><label>循环模式</label>
        <select id="cfg-loop"><option value="false">关闭</option><option value="true">开启</option></select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
  </div>

  <div class="card">
    <h2>网站登录 (szhdy.com)</h2>
    <p style="color:var(--muted);font-size:12px;margin-bottom:12px;">登录后系统自动保存 Cookie 用于库存检测（不登录无法判断库存）</p>
    <div class="form-row">
      <div class="form-group"><label>账号</label><input type="text" id="site-user" placeholder="szhdy 账号"></div>
      <div class="form-group"><label>密码</label><input type="password" id="site-pass" placeholder="szhdy 密码"></div>
    </div>
    <button class="btn btn-primary" onclick="doSiteLogin()">登录并保存 Cookie</button>
    <span id="cookie-status" style="margin-left:12px;font-size:12px;"></span>
  </div>

  <div class="card">
    <h2>手动 Cookie</h2>
    <p style="color:var(--muted);font-size:12px;margin-bottom:8px;">也可直接从浏览器复制 Cookie 字符串粘贴</p>
    <div class="form-row">
      <div class="form-group"><label>Cookie 字符串</label>
        <input type="text" id="manual-cookie" placeholder="key=val; key2=val2..." style="width:400px;">
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveManualCookie()">保存 Cookie</button>
  </div>
</div>

<!-- Notify -->
<div class="tab" id="tab-notify">
  <div class="card">
    <h2>通知渠道配置</h2>
    <p style="color:var(--muted);font-size:12px;margin-bottom:16px;">开启并配置需要的渠道，点击「保存」后生效，可点「测试」验证</p>
    <div id="notify-channels"></div>
    <button class="btn btn-primary" onclick="saveNotifyConfig()" style="margin-top:8px;">保存通知配置</button>
  </div>
</div>

</main>

<div id="toast"></div>

<script>
const BASE = window.location.pathname.replace(/\/+$/, '');
let _token = localStorage.getItem('hdy_token') || '';
let _statusInterval = null;
let _changesPage = 1;

// ── Auth ──────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + _token, 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  if (r.status === 401) { showLogin(); throw new Error('Unauthorized'); }
  return r;
}

async function doLogin() {
  const user = document.getElementById('adm-user').value;
  const pass = document.getElementById('adm-pass').value;
  try {
    const r = await fetch(BASE + '/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    if (r.ok) {
      const d = await r.json();
      _token = d.access_token;
      localStorage.setItem('hdy_token', _token);
      hideLogin();
      init();
    } else {
      document.getElementById('login-err').textContent = '账号或密码错误';
    }
  } catch (e) { document.getElementById('login-err').textContent = '连接失败: ' + e.message; }
}

function showLogin() { document.getElementById('login-screen').classList.add('show'); }
function hideLogin() { document.getElementById('login-screen').classList.remove('show'); }

// ── Tabs ──────────────────────────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'tab-products') loadProducts();
  if (id === 'tab-changes') loadChanges();
  if (id === 'tab-config') loadConfig();
  if (id === 'tab-notify') loadNotifyConfig();
}

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Status polling ─────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const r = await api('GET', '/api/crawler/status');
    if (!r.ok) return;
    const s = await r.json();
    document.getElementById('s-current-pid').textContent = s.current_pid || '—';
    document.getElementById('s-checked').textContent = s.checked_count;
    document.getElementById('s-changed').textContent = s.changed_count;
    document.getElementById('s-range').textContent = s.start_pid && s.end_pid ? s.start_pid + '–' + s.end_pid : '—';
    const badge = document.getElementById('status-badge');
    badge.textContent = s.running ? '运行中' : '已停止';
    badge.className = s.running ? 'running' : '';
    document.getElementById('btn-start').style.display = s.running ? 'none' : '';
    document.getElementById('btn-stop').style.display = s.running ? '' : 'none';
    if (s.running && s.start_pid && s.end_pid && s.current_pid) {
      const pct = Math.round((s.current_pid - s.start_pid) / (s.end_pid - s.start_pid + 1) * 100);
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-text').textContent = `PID ${s.current_pid} / ${s.end_pid}  (${pct}%)`;
    } else if (!s.running) {
      document.getElementById('progress-text').textContent = '未运行';
    }
  } catch(e) {}
}

async function loadDashChanges() {
  try {
    const r = await api('GET', '/api/changes?page=1&page_size=10');
    if (!r.ok) return;
    const d = await r.json();
    renderChangesTable('dash-changes-body', d.items);
  } catch(e) {}
}

// ── Crawler controls ───────────────────────────────────────────────────────
async function startCrawler() {
  const r = await api('POST', '/api/crawler/start');
  const d = await r.json();
  toast(d.started ? '爬虫已启动' : '爬虫已在运行', d.started ? 'success' : '');
  await pollStatus();
}
async function stopCrawler() {
  await api('POST', '/api/crawler/stop');
  toast('爬虫已停止'); await pollStatus();
}

// ── Products ───────────────────────────────────────────────────────────────
async function loadProducts() {
  const r = await api('GET', '/api/products?limit=500');
  if (!r.ok) return;
  const products = await r.json();
  const tbody = document.getElementById('products-body');
  tbody.innerHTML = products.map(p => `
    <tr>
      <td>${p.pid}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name || '—'}</td>
      <td>${p.price || '—'}</td>
      <td>${stockBadge(p.stock_status)}</td>
      <td style="color:var(--muted);font-size:11px;">${fmtDate(p.last_checked_at)}</td>
      <td style="color:var(--muted);font-size:11px;">${fmtDate(p.last_changed_at)}</td>
      <td><button class="btn btn-sm" onclick="showHistory(${p.pid})" style="background:#222;color:var(--text)">历史</button></td>
    </tr>`).join('');
}

function stockBadge(s) {
  if (s === 'in_stock') return '<span class="badge badge-green">有货</span>';
  if (s === 'out_of_stock') return '<span class="badge badge-red">无货</span>';
  return '<span class="badge badge-gray">未知</span>';
}

async function showHistory(pid) {
  showTab('tab-changes', document.querySelectorAll('nav button')[2]);
  document.getElementById('filter-pid').value = pid;
  loadChanges();
}

// ── Changes ───────────────────────────────────────────────────────────────
async function loadChanges(page) {
  if (page) _changesPage = page;
  const pid = document.getElementById('filter-pid').value;
  const pidParam = pid ? '&pid=' + pid : '';  // NOTE: pid filter handled via history route
  let url = `/api/changes?page=${_changesPage}&page_size=50`;
  if (pid) url = `/api/products/${pid}/history?page=${_changesPage}&page_size=50`;
  const r = await api('GET', url);
  if (!r.ok) return;
  const d = await r.json();
  renderChangesTable('changes-body', d.items);
  renderPagination(d.total, d.page, d.page_size);
}

function renderChangesTable(bodyId, items) {
  document.getElementById(bodyId).innerHTML = (items || []).map(c => `
    <tr>
      <td style="color:var(--muted);font-size:11px;">${fmtDate(c.changed_at)}</td>
      <td>${c.pid}</td>
      <td>${c.field_name}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.old_value || '—'}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.new_value || '—'}</td>
    </tr>`).join('');
}

function renderPagination(total, page, pageSize) {
  const pages = Math.ceil(total / pageSize);
  const el = document.getElementById('changes-pagination');
  el.innerHTML = '';
  for (let i = 1; i <= Math.min(pages, 20); i++) {
    const b = document.createElement('button');
    b.className = 'btn btn-sm' + (i === page ? ' btn-primary' : '');
    b.style.background = i === page ? '' : '#222'; b.style.color = '#fff';
    b.textContent = i; b.onclick = () => loadChanges(i);
    el.appendChild(b);
  }
}

// ── Config ────────────────────────────────────────────────────────────────
async function loadConfig() {
  const r = await api('GET', '/api/config');
  if (!r.ok) return;
  const c = await r.json();
  document.getElementById('cfg-start').value = c.start_pid || 1150;
  document.getElementById('cfg-end').value = c.end_pid || 1200;
  document.getElementById('cfg-interval').value = c.interval_ms || 1500;
  document.getElementById('cfg-loop').value = c.loop_enabled ? 'true' : 'false';
  const cs = document.getElementById('cookie-status');
  cs.textContent = c.has_cookie ? '✅ Cookie 已保存' : '⚠️ 未登录';
  cs.style.color = c.has_cookie ? 'var(--success)' : 'var(--warn)';
}

async function saveConfig() {
  const body = {
    start_pid: parseInt(document.getElementById('cfg-start').value),
    end_pid: parseInt(document.getElementById('cfg-end').value),
    interval_ms: parseInt(document.getElementById('cfg-interval').value),
    loop_enabled: document.getElementById('cfg-loop').value === 'true',
  };
  const r = await api('PUT', '/api/config', body);
  toast(r.ok ? '配置已保存' : '保存失败', r.ok ? 'success' : 'error');
}

async function doSiteLogin() {
  const u = document.getElementById('site-user').value;
  const p = document.getElementById('site-pass').value;
  const r = await api('POST', '/api/site_login', { username: u, password: p });
  const d = await r.json();
  toast(d.message, r.ok ? 'success' : 'error');
  if (r.ok) loadConfig();
}

async function saveManualCookie() {
  const cookie = document.getElementById('manual-cookie').value.trim();
  if (!cookie) return toast('请输入 Cookie 字符串', 'error');
  const r = await api('PUT', '/api/config', { login_cookie: cookie });
  toast(r.ok ? 'Cookie 已保存' : '保存失败', r.ok ? 'success' : 'error');
  if (r.ok) loadConfig();
}

// ── Notify config ─────────────────────────────────────────────────────────
const CHANNELS = [
  { key: 'telegram', name: 'Telegram Bot', fields: [['bot_token','Bot Token'],['chat_id','Chat ID']] },
  { key: 'wecom', name: '企业微信机器人', fields: [['webhook_url','Webhook URL']] },
  { key: 'dingtalk', name: '钉钉机器人', fields: [['webhook_url','Webhook URL'],['secret','加签 Secret (可选)']] },
  { key: 'feishu', name: '飞书机器人', fields: [['webhook_url','Webhook URL']] },
  { key: 'serverchan', name: 'Server酱 (微信)', fields: [['sendkey','SendKey']] },
  { key: 'bark', name: 'Bark (iOS)', fields: [['device_key','Device Key']] },
  { key: 'pushplus', name: 'PushPlus', fields: [['token','Token']] },
  { key: 'discord', name: 'Discord Webhook', fields: [['webhook_url','Webhook URL']] },
  { key: 'email', name: 'SMTP 邮件', fields: [['host','服务器'],['port','端口'],['user','账号'],['password','密码'],['to','收件人'],['use_tls','TLS(true/false)']] },
  { key: 'webhook', name: '自定义 Webhook', fields: [['url','URL'],['method','方法(POST)'],['headers','Headers(JSON)'],['payload','Payload(JSON,{{title}},{{body}})']] },
];

let _notifyCfg = {};

async function loadNotifyConfig() {
  const r = await api('GET', '/api/config');
  if (!r.ok) return;
  const c = await r.json();
  _notifyCfg = c.notify_channels || {};
  renderNotifyChannels();
}

function renderNotifyChannels() {
  const container = document.getElementById('notify-channels');
  container.innerHTML = CHANNELS.map(ch => {
    const cfg = _notifyCfg[ch.key] || {};
    const enabled = cfg.enabled || false;
    const fields = ch.fields.map(([k, label]) => `
      <div class="form-group">
        <label>${label}</label>
        <input type="text" id="nc-${ch.key}-${k}" value="${cfg[k] || ''}" style="width:260px;">
      </div>`).join('');
    return `
      <div class="channel-block">
        <h3>
          <div class="toggle ${enabled ? 'on' : ''}" id="tog-${ch.key}" onclick="toggleChannel('${ch.key}')"></div>
          ${ch.name}
          <button class="btn btn-sm" style="margin-left:auto;background:#222;color:var(--text);"
            onclick="testChannel('${ch.key}')">测试</button>
        </h3>
        <div class="form-row">${fields}</div>
      </div>`;
  }).join('');
}

function toggleChannel(key) {
  const tog = document.getElementById('tog-' + key);
  tog.classList.toggle('on');
}

function collectNotifyConfig() {
  const result = {};
  CHANNELS.forEach(ch => {
    const enabled = document.getElementById('tog-' + ch.key).classList.contains('on');
    const cfg = { enabled };
    ch.fields.forEach(([k]) => {
      const el = document.getElementById(`nc-${ch.key}-${k}`);
      if (el && el.value) cfg[k] = el.value;
    });
    if (enabled || Object.keys(cfg).length > 1) result[ch.key] = cfg;
  });
  return result;
}

async function saveNotifyConfig() {
  const nc = collectNotifyConfig();
  const r = await api('PUT', '/api/config', { notify_channels: nc });
  toast(r.ok ? '通知配置已保存' : '保存失败', r.ok ? 'success' : 'error');
  if (r.ok) _notifyCfg = nc;
}

async function testChannel(key) {
  const nc = collectNotifyConfig();
  const cfg = nc[key] || {};
  const r = await api('POST', '/api/notify/test', { channel: key, config: cfg });
  const d = await r.json();
  toast(d.success ? `${key} 发送成功 ✓` : `${key} 发送失败 ✗`, d.success ? 'success' : 'error');
}

// ── Utils ─────────────────────────────────────────────────────────────────
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s + (s.endsWith('Z') ? '' : 'Z'));
  return d.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  await pollStatus();
  await loadDashChanges();
  _statusInterval = setInterval(async () => { await pollStatus(); await loadDashChanges(); }, 3000);
}

// Check if already logged in
if (_token) { hideLogin(); init(); }

// Allow pressing Enter to login
document.getElementById('adm-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
